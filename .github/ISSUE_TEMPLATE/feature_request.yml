name: 功能建议
description: 为 lonely-world 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你希望添加的功能以及它能为玩家带来的价值。

  - type: textarea
    id: problem
    attributes:
      label: 问题/痛点
      description: 这个功能是为了解决什么问题
      placeholder: 目前切换模型需要在配置文件里手动修改，不够方便……
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你希望如何实现这个功能
      placeholder: 在游戏启动时增加一个“选择模型提供商”的菜单……
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他实现方式
      placeholder: 或者通过命令行参数 `--switch-model` 来切换……
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 任何其他有助于理解该建议的信息
